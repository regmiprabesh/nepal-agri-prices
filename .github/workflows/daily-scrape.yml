name: Daily market price scrape

on:
  schedule:
    - cron: "22 19 * * *"   # 19:22 UTC = 1:07 AM Nepal time (UTC+5:45)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright's Chromium browser
        run: playwright install --with-deps chromium

      - name: Install Xvfb (virtual display)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run scraper
        id: scrape
        run: |
          cd src
          xvfb-run --auto-servernum -- python3 main.py
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily market price scrape $(date -u +'%Y-%m-%d')"
            git push
          fi

      - name: Report scrape result
        run: |
          if [ "${{ steps.scrape.outcome }}" == "failure" ]; then
            echo "::warning::main.py exited non-zero — at least one market failed. Check the 'Run scraper' step log above."
          else
            echo "All markets scraped successfully."
          fi